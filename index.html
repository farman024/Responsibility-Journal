<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#C1121F"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Web Journal"/>
<title>Responsibility Journal — The Web of Impact</title>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --red: #C1121F;
  --deep-red: #7B0D1E;
  --ink: #0D0D0D;
  --silk: #F5F0E8;
  --gold: #C9A84C;
  --dim: rgba(245,240,232,0.4);
  --faint: rgba(245,240,232,0.05);
  --border: rgba(245,240,232,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background:var(--ink); color:var(--silk);
  font-family:'Crimson Pro',Georgia,serif;
  min-height:100vh; overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 15% 15%,rgba(193,18,31,0.1) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 85%,rgba(10,22,40,0.7) 0%,transparent 55%);
  pointer-events:none; z-index:0;
}
svg.web-bg {
  position:fixed; top:0; left:0; width:100%; height:100%;
  opacity:0.06; pointer-events:none; z-index:0;
}
.nav {
  position:sticky; top:0; z-index:100;
  background:rgba(13,13,13,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 16px; gap:0;
}
.nav-brand {
  font-family:'Bebas Neue',sans-serif; font-size:13px;
  letter-spacing:0.15em; color:var(--gold);
  margin-right:auto; padding:14px 0; flex-shrink:0;
}
.nav-tab {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  letter-spacing:0.15em; text-transform:uppercase;
  color:var(--dim); padding:16px 12px; cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap;
}
.nav-tab:hover { color:var(--silk); }
.nav-tab.active { color:var(--red); border-bottom-color:var(--red); }
.page { display:none; position:relative; z-index:1; }
.page.active { display:block; }
.container { max-width:780px; margin:0 auto; padding:32px 18px 80px; }
.heros-code-card {
  border:1px solid rgba(201,168,76,0.25);
  background:linear-gradient(145deg,rgba(123,13,30,0.25),rgba(10,22,40,0.6));
  border-radius:4px; padding:36px 32px;
  position:relative; overflow:hidden;
}
.heros-code-card::after {
  content:'🕷'; position:absolute; bottom:-10px; right:16px;
  font-size:110px; opacity:0.05; line-height:1;
}
.badge {
  display:inline-block; font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:0.3em; color:var(--gold);
  border:1px solid rgba(201,168,76,0.4); padding:4px 12px;
  border-radius:2px; margin-bottom:16px;
}
.heros-code-card h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(28px,7vw,50px); letter-spacing:0.06em;
  color:var(--red); line-height:1; margin-bottom:4px;
}
.heros-code-card h1 span { color:var(--gold); }
.subtitle {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  color:rgba(245,240,232,0.4); letter-spacing:0.2em; margin-bottom:22px;
}
.divider {
  width:100%; height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:18px 0; opacity:0.45;
}
.heros-code-text { font-size:16px; line-height:1.85; color:rgba(245,240,232,0.88); font-style:italic; }
.heros-code-text strong { color:var(--silk); font-style:normal; }
.signature {
  margin-top:20px; font-family:'Bebas Neue',sans-serif;
  font-size:12px; letter-spacing:0.25em; color:var(--gold); opacity:0.7;
}
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:24px 0; }
.stat-card {
  background:var(--faint); border:1px solid var(--border);
  border-radius:3px; padding:14px 12px; text-align:center;
}
.stat-val { font-family:'Bebas Neue',sans-serif; font-size:30px; color:var(--red); line-height:1; }
.stat-label { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.18em; color:var(--dim); margin-top:3px; }
.section-hdr { font-family:'Bebas Neue',sans-serif; font-size:clamp(22px,5vw,34px); letter-spacing:0.08em; color:var(--silk); margin-bottom:4px; }
.section-hdr span { color:var(--red); }
.date-line { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.18em; color:var(--dim); margin-bottom:24px; }
.mood-row { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:24px; }
.mood-pill {
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.1em;
  padding:5px 12px; border-radius:20px; border:1px solid var(--border);
  color:var(--dim); cursor:pointer; transition:all 0.2s; user-select:none;
}
.mood-pill:hover,.mood-pill.active { border-color:var(--red); color:var(--silk); background:rgba(193,18,31,0.15); }
.pillar { margin-bottom:26px; border-left:3px solid var(--red); padding-left:18px; }
.pillar-label { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.3em; color:var(--gold); margin-bottom:2px; }
.pillar-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.06em; color:var(--silk); margin-bottom:4px; }
.pillar-desc { font-size:13px; color:var(--dim); margin-bottom:10px; font-style:italic; }
.thread-inputs { display:flex; flex-direction:column; gap:7px; }
.thread-row { display:flex; align-items:center; gap:8px; }
.thread-icon { font-size:13px; opacity:0.5; flex-shrink:0; }
.thread-input {
  flex:1; background:var(--faint); border:1px solid var(--border);
  border-radius:3px; color:var(--silk);
  font-family:'Crimson Pro',Georgia,serif; font-size:15px;
  padding:8px 12px; outline:none; transition:border-color 0.2s;
}
.thread-input::placeholder { color:rgba(245,240,232,0.2); font-style:italic; }
.thread-input:focus { border-color:rgba(193,18,31,0.5); }
.weight-wrap { margin-top:12px; }
.weight-label { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.15em; color:var(--dim); margin-bottom:5px; }
.weight-bar { -webkit-appearance:none; width:100%; height:4px; background:var(--border); border-radius:2px; outline:none; }
.weight-bar::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--red); cursor:pointer; border:2px solid var(--silk); }
.write-area {
  width:100%; background:var(--faint); border:1px solid var(--border);
  border-radius:3px; color:var(--silk);
  font-family:'Crimson Pro',Georgia,serif; font-size:16px; line-height:1.7;
  padding:12px 14px; resize:vertical; min-height:88px; outline:none;
  transition:border-color 0.2s,background 0.2s;
}
.write-area::placeholder { color:rgba(245,240,232,0.2); font-style:italic; }
.write-area:focus { border-color:rgba(193,18,31,0.5); background:rgba(245,240,232,0.06); }
.choice-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:10px; }
.choice-card {
  background:var(--faint); border:1px solid var(--border);
  border-radius:3px; padding:9px 11px; cursor:pointer;
  transition:all 0.2s; font-size:11px; color:var(--dim);
  text-align:center; font-family:'JetBrains Mono',monospace; letter-spacing:0.04em;
}
.choice-card:hover,.choice-card.active { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,0.07); }
.repair-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:10px; }
.repair-block label { display:block; font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.2em; color:var(--dim); margin-bottom:5px; }
.save-btn {
  display:block; width:100%; margin-top:26px; padding:14px;
  background:linear-gradient(135deg,var(--deep-red),var(--red));
  border:none; border-radius:3px; color:var(--silk);
  font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:0.2em;
  cursor:pointer; transition:opacity 0.2s,transform 0.1s;
}
.save-btn:hover { opacity:0.9; }
.save-btn:active { transform:scale(0.99); }
.toast { text-align:center; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.2em; color:var(--gold); margin-top:10px; opacity:0; transition:opacity 0.4s; }
.history-empty { text-align:center; padding:60px 20px; color:var(--dim); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.2em; line-height:2; }
.entry-card { background:var(--faint); border:1px solid var(--border); border-radius:3px; margin-bottom:12px; overflow:hidden; transition:border-color 0.2s; }
.entry-card:hover { border-color:rgba(193,18,31,0.35); }
.entry-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; cursor:pointer; gap:10px; }
.entry-date { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.15em; color:var(--gold); }
.entry-mood { font-size:11px; color:var(--dim); font-family:'JetBrains Mono',monospace; letter-spacing:0.08em; margin-top:2px; }
.entry-weight-badge { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--red); flex-shrink:0; }
.entry-toggle { font-size:14px; color:var(--dim); flex-shrink:0; transition:transform 0.2s; }
.entry-card.open .entry-toggle { transform:rotate(180deg); }
.entry-body { display:none; padding:0 16px 16px; border-top:1px solid var(--border); }
.entry-card.open .entry-body { display:block; }
.entry-section { margin-top:12px; }
.entry-section-title { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.25em; color:var(--gold); margin-bottom:5px; }
.entry-text { font-size:14px; line-height:1.7; color:rgba(245,240,232,0.75); }
.entry-threads { display:flex; flex-direction:column; gap:4px; }
.entry-thread-item { font-size:13px; color:rgba(245,240,232,0.7); padding-left:14px; position:relative; }
.entry-thread-item::before { content:'〰'; position:absolute; left:0; color:var(--dim); font-size:11px; }
.entry-chips { display:flex; flex-wrap:wrap; gap:5px; }
.entry-chip { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.08em; padding:3px 8px; border-radius:12px; border:1px solid rgba(201,168,76,0.3); color:var(--gold); }
.delete-btn {
  margin-top:14px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:0.15em;
  color:#ff4d4d;
  background:rgba(193,18,31,0.12);
  border:1px solid rgba(193,18,31,0.4);
  border-radius:3px;
  padding:8px 14px;
  cursor:pointer;
  width:100%;
  transition:all 0.2s;
  text-shadow:0 0 8px rgba(193,18,31,0.6);
  box-shadow:0 0 8px rgba(193,18,31,0.15);
}
.delete-btn:hover, .delete-btn:active {
  background:rgba(193,18,31,0.25);
  border-color:var(--red);
  color:#ff6b6b;
  box-shadow:0 0 16px rgba(193,18,31,0.4);
  text-shadow:0 0 12px rgba(255,77,77,0.9);
}
.progress-section { margin-bottom:32px; }
.progress-title { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:0.08em; color:var(--silk); margin-bottom:12px; }
.chart-wrap { background:var(--faint); border:1px solid var(--border); border-radius:3px; padding:18px 14px; }
.chart-bars { display:flex; align-items:flex-end; gap:5px; height:100px; }
.chart-bar-col { display:flex; flex-direction:column; align-items:center; flex:1; min-width:0; max-width:60px; }
.chart-bar-val { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--dim); margin-bottom:3px; }
.chart-bar { width:100%; border-radius:2px 2px 0 0; background:linear-gradient(to top,var(--deep-red),var(--red)); min-height:4px; }
.chart-bar-empty { width:100%; border-radius:2px 2px 0 0; background:rgba(245,240,232,0.06); min-height:4px; height:4px; }
.chart-bar-label { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--dim); margin-top:4px; text-align:center; white-space:nowrap; overflow:hidden; max-width:100%; text-overflow:ellipsis; }
.integrity-summary { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.integrity-item { background:var(--faint); border:1px solid var(--border); border-radius:3px; padding:11px 13px; }
.integrity-count { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--gold); }
.integrity-name { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.1em; color:var(--dim); margin-top:2px; }
.mood-summary-grid { display:flex; flex-wrap:wrap; gap:8px; }
.mood-summary-item { background:var(--faint); border:1px solid var(--border); border-radius:3px; padding:10px 13px; text-align:center; }
.mood-summary-count { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--red); }
.mood-summary-label { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.08em; color:var(--dim); margin-top:2px; }
.closing { margin-top:36px; text-align:center; padding:22px; border:1px solid rgba(201,168,76,0.2); background:rgba(123,13,30,0.15); border-radius:3px; }
.closing-quote { font-size:16px; font-style:italic; color:rgba(245,240,232,0.75); line-height:1.7; margin-bottom:10px; }
.closing-attr { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.25em; color:var(--gold); opacity:0.6; }
/* ── EDIT MODAL ── */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.85); backdrop-filter:blur(4px);
  align-items:flex-start; justify-content:center;
  padding:20px 16px; overflow-y:auto;
}
.modal-overlay.open { display:flex; }
.modal {
  background:#111; border:1px solid var(--gold);
  border-radius:4px; width:100%; max-width:700px;
  margin:auto; padding:24px 20px 32px;
  position:relative; z-index:201;
}
.modal-title {
  font-family:'Bebas Neue',sans-serif; font-size:22px;
  letter-spacing:0.08em; color:var(--gold); margin-bottom:4px;
}
.modal-date {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  letter-spacing:0.2em; color:var(--dim); margin-bottom:20px;
}
.modal-close {
  position:absolute; top:16px; right:16px;
  background:none; border:none; color:var(--dim);
  font-size:20px; cursor:pointer; transition:color 0.2s;
}
.modal-close:hover { color:var(--silk); }
.modal-section { margin-bottom:16px; }
.modal-label {
  font-family:'JetBrains Mono',monospace; font-size:9px;
  letter-spacing:0.25em; color:var(--gold); margin-bottom:6px;
}
.modal .thread-input, .modal .write-area {
  margin-bottom:6px;
}
.modal-mood-row { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:4px; }
.modal-save-btn {
  display:block; width:100%; margin-top:20px; padding:13px;
  background:linear-gradient(135deg,var(--deep-red),var(--red));
  border:none; border-radius:3px; color:var(--silk);
  font-family:'Bebas Neue',sans-serif; font-size:16px;
  letter-spacing:0.2em; cursor:pointer; transition:opacity 0.2s;
}
.modal-save-btn:hover { opacity:0.9; }
.modal .choice-grid { margin-bottom:10px; }

/* ── FILTER TABS (History) ── */
.filter-tabs {
  display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap;
}
.filter-tab {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  letter-spacing:0.12em; padding:6px 14px; border-radius:2px;
  border:1px solid var(--border); color:var(--dim);
  cursor:pointer; transition:all 0.2s; background:none;
}
.filter-tab:hover { color:var(--silk); border-color:rgba(245,240,232,0.3); }
.filter-tab.active { color:var(--gold); border-color:var(--gold); background:rgba(201,168,76,0.08); }

/* ── PERIOD SELECTOR ── */
.period-select {
  display:none; margin-bottom:16px;
}
.period-select.visible { display:block; }
.period-select select {
  background:var(--faint); border:1px solid var(--border);
  border-radius:3px; color:var(--silk);
  font-family:'JetBrains Mono',monospace; font-size:11px;
  padding:8px 12px; outline:none; width:100%;
  letter-spacing:0.1em; cursor:pointer;
}
.period-select select option { background:#1a1a1a; color:var(--silk); }

/* ── ENTRY ACTION BUTTONS ── */
.entry-actions { display:flex; gap:8px; margin-top:14px; }
.edit-btn {
  flex:1; font-family:'JetBrains Mono',monospace;
  font-size:11px; letter-spacing:0.15em; color:#4da6ff;
  background:rgba(77,166,255,0.08); border:1px solid rgba(77,166,255,0.35);
  border-radius:3px; padding:8px 14px; cursor:pointer;
  transition:all 0.2s;
  text-shadow:0 0 8px rgba(77,166,255,0.5);
  box-shadow:0 0 8px rgba(77,166,255,0.1);
}
.edit-btn:hover, .edit-btn:active {
  background:rgba(77,166,255,0.18); border-color:#4da6ff;
  box-shadow:0 0 14px rgba(77,166,255,0.35);
}

@media(max-width:520px){
  .heros-code-card { padding:24px 16px; }
  .choice-grid,.repair-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div style="
  position:fixed;
  bottom:-60px;
  right:-60px;
  width:520px;
  height:520px;
